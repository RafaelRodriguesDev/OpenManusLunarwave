version: "3.9"

services:
  openmanus-web:
    build:
      context: ..
      dockerfile: Dockerfile

    container_name: openmanus-web
    restart: unless-stopped

    tty: true
    stdin_open: true

    ports:
      - "8001:8000"

    environment:
      WEB_DIR: /app/OpenManus/web
      NOVNC_URL: "/vnc/vnc.html?autoconnect=true&resize=scale&path=vnc/websockify"

      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY}

      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-8192}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.0}

      VISION_MODEL: ${VISION_MODEL:-deepseek-chat}
      VISION_BASE_URL: ${VISION_BASE_URL:-https://api.deepseek.com}
      VISION_API_KEY: ${VISION_API_KEY:-${LLM_API_KEY}}

      WORKSPACE_DIR: /workspace
      DISPLAY: :99
      DAYTONA_API_KEY: ${DAYTONA_API_KEY:-not-used}

    volumes:
      - openmanus_web_workspace:/workspace

volumes:
  openmanus_web_workspace: